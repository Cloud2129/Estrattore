name: Build Pratiche.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        shell: pwsh
        run: pip install pyinstaller customtkinter selenium openpyxl webdriver-manager

      - name: Build exe con PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "Pratiche" `
            --collect-all customtkinter `
            --collect-all selenium `
            --collect-all webdriver_manager `
            --hidden-import selenium.webdriver.firefox.webdriver `
            --hidden-import selenium.webdriver.firefox.options `
            --hidden-import selenium.webdriver.firefox.service `
            --hidden-import selenium.webdriver.chrome.webdriver `
            --hidden-import selenium.webdriver.chrome.options `
            --hidden-import selenium.webdriver.chrome.service `
            --hidden-import selenium.webdriver.edge.webdriver `
            --hidden-import selenium.webdriver.edge.options `
            --hidden-import selenium.webdriver.edge.service `
            --hidden-import selenium.webdriver.common.by `
            --hidden-import webdriver_manager.chrome `
            --hidden-import webdriver_manager.microsoft `
            --hidden-import webdriver_manager.firefox `
            --hidden-import openpyxl `
            --exclude-module matplotlib `
            --exclude-module numpy `
            --exclude-module pandas `
            --exclude-module PIL `
            --exclude-module scipy `
            --exclude-module tkinter.test `
            pratiche.py

      - name: Crea archivio ZIP
        shell: pwsh
        run: Compress-Archive -Path dist\Pratiche\* -DestinationPath Pratiche_Immigrazione.zip

      - name: Pubblica come Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            Pratiche Immigrazione — build automatico

            **Come installare:**
            1. Scarica e decomprimi `Pratiche_Immigrazione.zip` in una cartella
            2. Avvia `Pratiche.exe` dalla cartella decompressa

            **Browser supportati:** Edge, Chrome, Firefox
            I driver vengono scaricati automaticamente al primo avvio.
          files: Pratiche_Immigrazione.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
