name: Build Pratiche.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        shell: pwsh
        run: pip install pyinstaller customtkinter openpyxl

      - name: Build exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "Pratiche" `
            --collect-all customtkinter `
            --hidden-import openpyxl `
            --exclude-module selenium `
            --exclude-module matplotlib `
            --exclude-module numpy `
            --exclude-module pandas `
            --exclude-module PIL `
            --exclude-module scipy `
            pratiche.py

      - name: Crea ZIP
        shell: pwsh
        run: Compress-Archive -Path dist\Pratiche\* -DestinationPath Pratiche_Immigrazione.zip

      - name: Pubblica Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            Pratiche Immigrazione — build automatico

            **Come installare:**
            1. Scarica e decomprimi `Pratiche_Immigrazione.zip`
            2. Avvia `Pratiche.exe`
            3. Clicca **📎 Bookmarklet** per configurare il pulsante nel browser
          files: Pratiche_Immigrazione.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
